services:
  mysql:
    image: mysql:8.4
    container_name: observai-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: observai
      MYSQL_USER: observai
      MYSQL_PASSWORD: observai
    ports:
      - "3307:3306"
    volumes:
      - observai-mysql-data:/var/lib/mysql
      - ./docker/mysql:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10

  nacos:
    image: nacos/nacos-server:v2.4.3
    container_name: observai-nacos
    environment:
      MODE: standalone
      NACOS_AUTH_ENABLE: "false"
    ports:
      - "8848:8848"
      - "9848:9848"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8848/nacos/actuator/health | grep -q UP"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 60s

  gateway-service:
    build:
      context: .
      dockerfile: Dockerfile.backend
      args:
        SERVICE: gateway-service
    environment:
      NACOS_ADDR: nacos:8848
      JWT_SECRET: ${JWT_SECRET:-observai-default-development-secret-key}
    ports:
      - "8080:8080"
    restart: on-failure
    depends_on:
      nacos:
        condition: service_healthy

  user-service:
    build:
      context: .
      dockerfile: Dockerfile.backend
      args:
        SERVICE: user-service
    environment:
      NACOS_ADDR: nacos:8848
      JWT_SECRET: ${JWT_SECRET:-observai-default-development-secret-key}
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DATABASE: observai
      MYSQL_USER: observai
      MYSQL_PASSWORD: observai
    restart: on-failure
    depends_on:
      mysql:
        condition: service_healthy
      nacos:
        condition: service_healthy

  monitor-service:
    build:
      context: .
      dockerfile: Dockerfile.backend
      args:
        SERVICE: monitor-service
    environment:
      NACOS_ADDR: nacos:8848
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DATABASE: observai
      MYSQL_USER: observai
      MYSQL_PASSWORD: observai
    restart: on-failure
    depends_on:
      nacos:
        condition: service_healthy
      mysql:
        condition: service_healthy
      alert-service:
        condition: service_started

  alert-service:
    build:
      context: .
      dockerfile: Dockerfile.backend
      args:
        SERVICE: alert-service
    environment:
      NACOS_ADDR: nacos:8848
      ALIYUN_AI_API_KEY: ${ALIYUN_AI_API_KEY:-}
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DATABASE: observai
      MYSQL_USER: observai
      MYSQL_PASSWORD: observai
    restart: on-failure
    depends_on:
      nacos:
        condition: service_healthy
      mysql:
        condition: service_healthy
      notification-service:
        condition: service_started

  notification-service:
    build:
      context: .
      dockerfile: Dockerfile.backend
      args:
        SERVICE: notification-service
    environment:
      NACOS_ADDR: nacos:8848
      MAIL_HOST: ${MAIL_HOST:-}
      MAIL_PORT: ${MAIL_PORT:-465}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DATABASE: observai
      MYSQL_USER: observai
      MYSQL_PASSWORD: observai
    restart: on-failure
    depends_on:
      nacos:
        condition: service_healthy
      mysql:
        condition: service_healthy

  demo-user-service:
    build:
      context: .
      dockerfile: Dockerfile.backend
      args:
        SERVICE: monitored-services/demo-user-service
    environment:
      NACOS_ADDR: nacos:8848
    restart: on-failure
    depends_on:
      nacos:
        condition: service_healthy

  demo-order-service:
    build:
      context: .
      dockerfile: Dockerfile.backend
      args:
        SERVICE: monitored-services/demo-order-service
    environment:
      NACOS_ADDR: nacos:8848
    restart: on-failure
    depends_on:
      nacos:
        condition: service_healthy

  demo-payment-service:
    build:
      context: .
      dockerfile: Dockerfile.backend
      args:
        SERVICE: monitored-services/demo-payment-service
    environment:
      NACOS_ADDR: nacos:8848
    restart: on-failure
    depends_on:
      nacos:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "3000:80"
    depends_on:
      gateway-service:
        condition: service_started

volumes:
  observai-mysql-data:
